<svg viewBox="-10 -10 180 140" xmlns="http://www.w3.org/2000/svg">
  <!-- Rectangle gris clair (AMFE) -->
  <rect x="0" y="0" width="60" height="60" fill="rgb(153,153,153)" fill-opacity="0.1" stroke="rgb(153,153,153)" stroke-width="1" />

  <!-- Rectangle gris foncé (MBHG) -->
  <rect x="60" y="0" width="100" height="100" fill="rgb(102,102,102)" fill-opacity="0.1" stroke="rgb(102,102,102)" stroke-width="1" />

  <!-- Points et étiquettes -->
  <circle cx="0" cy="0" r="3" fill="black" />
  <text x="10" y="10" font-size="12" text-anchor="start">A</text>

  <circle cx="160" cy="0" r="3" fill="black" />
  <text x="170" y="10" font-size="12" text-anchor="start">B</text>

  <circle cx="60" cy="0" r="3" fill="black" />
  <text x="70" y="10" font-size="12" text-anchor="start">M</text>

  <circle cx="60" cy="60" r="3" fill="black" />
  <text x="70" y="70" font-size="12" text-anchor="start">E</text>

  <circle cx="0" cy="60" r="3" fill="black" />
  <text x="10" y="70" font-size="12" text-anchor="start">F</text>

  <circle cx="60" cy="100" r="3" fill="black" />
  <text x="70" y="110" font-size="12" text-anchor="start">H</text>

  <circle cx="160" cy="100" r="3" fill="black" />
  <text x="170" y="110" font-size="12" text-anchor="start">G</text>
</svg>
